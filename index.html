<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kings Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f2027;
color:white;
}

header{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
box-shadow:0 0 15px cyan;
z-index:1000;
}

.page{
display:none;
padding:80px 15px 80px;
min-height:100vh;
animation:fade 0.3s ease-in-out;
}

.active{display:block;}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.card{
background:#1e2a38;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,255,255,0.2);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 20px cyan;
}

img{border-radius:10px;}

button{
padding:10px 14px;
border:none;
border-radius:8px;
margin-top:5px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#5865F2;color:white;}
.danger{background:red;color:white;}
.edit{background:orange;color:white;}
.buy{background:#00c853;color:white;box-shadow:0 0 10px #00ff88;}
.back{background:#444;color:white;}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
box-shadow:0 0 15px cyan;
}

.nav-btn{
background:none;
color:white;
border:none;
font-size:16px;
}

.section-box{
background:#1e2a38;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<header>👑 The Kings Mart</header>

<!-- HOME -->
<div id="home" class="page active">
<div id="productList"></div>
</div>

<!-- DETAILS -->
<div id="details" class="page">
<button class="back" onclick="showPage('home')">⬅ Back</button>
<div id="detailsContent"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<button class="back" onclick="showPage('home')">⬅ Back</button>
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Password">
<button class="primary" onclick="adminLogin()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<button class="back" onclick="showPage('home')">⬅ Back</button>
<h3>Admin Panel</h3>

<input id="name" placeholder="Product Name">
<input id="priceR" placeholder="Price in ₹">
<input id="priceD" placeholder="Price in $">
<input type="file" id="imageFile" accept="image/*">
<img id="preview" width="100%" style="display:none;">
<textarea id="desc" placeholder="Description"></textarea>

<button class="primary" onclick="saveProduct()">Save Product</button>
<button class="edit" onclick="cancelEdit()">Cancel Edit</button>

<div id="adminProducts"></div>
</div>

<div class="bottom-nav">
<button class="nav-btn" onclick="showPage('home')">🏠 Home</button>
<button class="nav-btn" onclick="showPage('admin')">⚙ Admin</button>
</div>

<script>
let editIndex=null;
let uploadedImage="";

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="home") loadProducts();
if(id==="dashboard") loadAdminProducts();
}

function adminLogin(){
if(document.getElementById("adminPass").value==="king_2211"){
showPage("dashboard");
}else{
alert("Wrong Password");
}
}

document.getElementById("imageFile").addEventListener("change",function(){
let file=this.files[0];
if(!file) return;
let reader=new FileReader();
reader.onload=function(e){
uploadedImage=e.target.result;
preview.src=uploadedImage;
preview.style.display="block";
}
reader.readAsDataURL(file);
});

function saveProduct(){
let name=document.getElementById("name").value.trim();
let priceR=document.getElementById("priceR").value.trim();
let priceD=document.getElementById("priceD").value.trim();
let desc=document.getElementById("desc").value.trim();

if(!name||!priceR||!priceD||!desc||!uploadedImage){
alert("Fill all fields");
return;
}

let products=JSON.parse(localStorage.getItem("products"))||[];

if(editIndex===null){
products.push({name,priceR,priceD,image:uploadedImage,desc});
}else{
products[editIndex]={name,priceR,priceD,image:uploadedImage,desc};
editIndex=null;
}

localStorage.setItem("products",JSON.stringify(products));
cancelEdit();
loadAdminProducts();
loadProducts();
}

function loadProducts(){
let products=JSON.parse(localStorage.getItem("products"))||[];
let container=document.getElementById("productList");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card" onclick="openDetails(${i})">
<img src="${p.image}" width="100%">
<h3>${p.name}</h3>
<p>₹ ${p.priceR}</p>
</div>`;
});
}

function openDetails(i){
let products=JSON.parse(localStorage.getItem("products"))||[];
let p=products[i];

document.getElementById("detailsContent").innerHTML=`
<img src="${p.image}" width="100%">
<h2>${p.name}</h2>
<p>${p.desc}</p>
<p>₹ ${p.priceR}</p>
<p>$ ${p.priceD}</p>

<div class="section-box">
<h4>Currency We Receive</h4>
<p>₹ Rupees</p>
<p>$ Dollars</p>
</div>

<div class="section-box">
<h4>Payment Methods</h4>
<p>Upi</p>
<p>Crypto</p>
<p>Ltc</p>
<p>Usdt</p>
</div>

<button class="buy" onclick="window.location.href='https://discord.gg/JMN85ZPGNc'">
Buy Now
</button>
`;

showPage("details");
}

function loadAdminProducts(){
let products=JSON.parse(localStorage.getItem("products"))||[];
let container=document.getElementById("adminProducts");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<h4>${p.name}</h4>
<button class="edit" onclick="editProduct(${i})">Edit</button>
<button class="danger" onclick="deleteProduct(${i})">Delete</button>
</div>`;
});
}

function editProduct(i){
let products=JSON.parse(localStorage.getItem("products"))||[];
let p=products[i];
document.getElementById("name").value=p.name;
document.getElementById("priceR").value=p.priceR;
document.getElementById("priceD").value=p.priceD;
document.getElementById("desc").value=p.desc;
uploadedImage=p.image;
preview.src=uploadedImage;
preview.style.display="block";
editIndex=i;
}

function deleteProduct(i){
let products=JSON.parse(localStorage.getItem("products"))||[];
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
loadAdminProducts();
loadProducts();
}

function cancelEdit(){
editIndex=null;
document.getElementById("name").value="";
document.getElementById("priceR").value="";
document.getElementById("priceD").value="";
document.getElementById("desc").value="";
document.getElementById("imageFile").value="";
preview.style.display="none";
uploadedImage="";
}

loadProducts();
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

</script>
</body>
</html>
